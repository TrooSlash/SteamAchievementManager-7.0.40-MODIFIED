version: 7.0.{build}

branches:
  only:
    - master

skip_tags: true
skip_commits:
  files:
    - .github/*
    - README.md

max_jobs: 1

image: Visual Studio 2019

clone_folder: c:\projects\SAM

cache:
  - packages -> **\packages.config
  - '%LocalAppData%\NuGet\Cache'
  - '%LocalAppData%\NuGet\v3-cache'

install:
  - git submodule update --init --recursive

configuration:
  - Release

dotnet_csproj:
  patch: true
  file: '**\*.csproj'
  version: '{version}'
  assembly_version: '{version}'
  file_version: '{version}'
  informational_version: '{version}'

build:
  project: SAM.sln
  parallel: true
  verbosity: minimal

before_build:
  - nuget restore
  
after_build:
  - set TZ=GMT
  - git log . > git-log.txt
  - powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; $stage='release_stage'; if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }; New-Item -ItemType Directory -Path $stage | Out-Null; New-Item -ItemType Directory -Path (Join-Path $stage 'lib') | Out-Null; Copy-Item './upload/SAM.Picker.exe' $stage; Copy-Item './upload/SAM.Game.exe' $stage; Copy-Item './upload/SAM.API.dll' $stage; Copy-Item './upload/*.config' (Join-Path $stage 'lib'); Copy-Item './upload/System.*.dll' (Join-Path $stage 'lib')"
  - 7z a -r -tzip -mx=9 -x!*/LICENSE.txt SAM-Evolved-%APPVEYOR_BUILD_VERSION%.zip ./LICENSE.txt ./git-log.txt ./release_stage/*

artifacts:
  - path: '*-*.zip'
